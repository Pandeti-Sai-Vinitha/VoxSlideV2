<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9C27B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad)" />
  
  <!-- Robot head -->
  <rect x="150" y="130" width="212" height="160" rx="20" fill="white" />
  
  <!-- Robot antenna -->
  <rect x="240" y="80" width="32" height="50" rx="16" fill="white" />
  <circle cx="256" cy="75" r="12" fill="white" />
  
  <!-- Robot eyes -->
  <rect x="190" y="160" width="35" height="35" rx="6" fill="#9C27B0" />
  <rect x="287" y="160" width="35" height="35" rx="6" fill="#9C27B0" />
  
  <!-- Eye shine -->
  <circle cx="202" cy="172" r="6" fill="white" opacity="0.7" />
  <circle cx="299" cy="172" r="6" fill="white" opacity="0.7" />
  
  <!-- Robot mouth -->
  <line x1="200" y1="245" x2="312" y2="245" stroke="#9C27B0" stroke-width="4" stroke-linecap="round" />
  
  <!-- Left ear -->
  <rect x="110" y="180" width="30" height="50" rx="15" fill="white" />
  
  <!-- Right ear -->
  <rect x="372" y="180" width="30" height="50" rx="15" fill="white" />
  
  <!-- Chat bubbles -->
  <g opacity="0.9">
    <!-- Left bubble -->
    <rect x="120" y="310" width="140" height="80" rx="15" fill="white" opacity="0.95" />
    <polygon points="120,360 100,380 120,375" fill="white" opacity="0.95" />
    
    <!-- Right bubble -->
    <rect x="252" y="350" width="140" height="80" rx="15" fill="white" opacity="0.95" />
    <polygon points="392,400 412,420 392,415" fill="white" opacity="0.95" />
  </g>
</svg>